<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>银行实物金条价格对比</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1a1d2e, #16213e);
      border-bottom: 1px solid #2d3748;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .gold-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #f6d365, #e8a020);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 { font-size: 17px; font-weight: 700; color: #f7d794; }
    .subtitle { font-size: 11px; color: #718096; margin-top: 1px; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px; color: #a0aec0;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #48bb78;
    }
    .dot.loading { background: #ed8936; animation: blink 0.8s infinite; }
    .dot.error { background: #fc8181; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ===== SPOT CARD ===== */
    .container { max-width: 720px; margin: 0 auto; padding: 16px; }

    .spot-card {
      background: linear-gradient(135deg, #1a1d2e, #1e2438);
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .spot-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #f6d365, #e8a020);
    }

    .spot-main .label { font-size: 12px; color: #718096; margin-bottom: 6px; }

    .spot-price-row { display: flex; align-items: baseline; gap: 8px; }

    .spot-price {
      font-size: 38px; font-weight: 800;
      color: #f7d794;
      letter-spacing: -1px;
      line-height: 1;
    }

    .spot-price.loading-state {
      font-size: 28px;
      color: #4a5568;
    }

    .spot-unit { font-size: 13px; color: #718096; }

    .change-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 12px; font-weight: 500;
      padding: 3px 8px; border-radius: 12px;
      margin-top: 8px;
    }
    .change-badge.up { background: rgba(72,187,120,.15); color: #68d391; }
    .change-badge.down { background: rgba(252,129,74,.15); color: #fc8181; }
    .change-badge.flat { background: rgba(113,128,150,.15); color: #718096; }

    .spot-meta {
      text-align: right;
      flex-shrink: 0;
    }
    .spot-meta .usd { font-size: 15px; color: #a0aec0; font-weight: 600; }
    .spot-meta .usd-label { font-size: 11px; color: #4a5568; margin-bottom: 2px; }
    .spot-meta .rate { font-size: 11px; color: #4a5568; margin-top: 4px; }

    /* ===== WEIGHT TABS ===== */
    .weight-tabs {
      display: flex; gap: 8px;
      margin-bottom: 14px;
    }

    .weight-tab {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: 1px solid #2d3748;
      background: #1a1d2e;
      color: #718096;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .weight-tab:hover { border-color: #4a5568; color: #a0aec0; }

    .weight-tab.active {
      background: linear-gradient(135deg, #3d2b00, #4a3500);
      border-color: #c8870a;
      color: #f6d365;
    }

    .weight-tab .gram { font-size: 11px; font-weight: 400; color: inherit; opacity: 0.7; }

    /* ===== BANK LIST ===== */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 13px; color: #718096;
    }

    .sort-label { font-size: 11px; color: #4a5568; }

    .bank-list { display: flex; flex-direction: column; gap: 8px; }

    .bank-item {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .bank-item:hover { border-color: #4a5568; }

    .bank-item.rank-1 { border-color: #c8870a; }
    .bank-item.rank-1::before {
      content: '最低价';
      position: absolute; top: 0; right: 0;
      background: linear-gradient(135deg, #c8870a, #e8a020);
      color: white;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px;
      border-bottom-left-radius: 8px;
    }

    .rank-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #2d3748;
      color: #718096;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .rank-num.r1 { background: linear-gradient(135deg, #c8870a, #e8a020); color: white; }
    .rank-num.r2 { background: #4a5568; color: #cbd5e0; }
    .rank-num.r3 { background: #3d4a5c; color: #a0aec0; }

    .bank-logo {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .bank-info { flex: 1; min-width: 0; }
    .bank-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .bank-product { font-size: 11px; color: #718096; margin-top: 2px; }

    .bank-price-area { text-align: right; flex-shrink: 0; }

    .total-price {
      font-size: 22px; font-weight: 800;
      color: #f7d794;
      letter-spacing: -0.5px;
    }

    .total-price .unit { font-size: 12px; font-weight: 400; color: #718096; }

    .price-breakdown {
      font-size: 11px; color: #4a5568;
      margin-top: 2px;
    }

    .premium { color: #fc8181; }

    /* ===== NOTICE ===== */
    .notice {
      margin-top: 16px;
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-left: 3px solid #c8870a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px; color: #718096;
      line-height: 1.7;
    }

    .notice strong { color: #a0aec0; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px; color: #4a5568;
    }

    /* ===== SKELETON ===== */
    .skel {
      display: inline-block;
      background: linear-gradient(90deg, #2d3748 25%, #3d4a5c 50%, #2d3748 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="gold-icon">🥇</div>
    <div>
      <h1>实物金条价格对比</h1>
      <div class="subtitle">主要银行 Au9999 投资金条</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">加载中</span>
  </div>
</header>

<div class="container">

  <!-- 现货价卡片 -->
  <div class="spot-card">
    <div class="spot-main">
      <div class="label">上海金现货参考价</div>
      <div class="spot-price-row">
        <div class="spot-price" id="spotCny">
          <span class="skel" style="width:140px;height:38px;display:inline-block;vertical-align:middle"></span>
        </div>
        <div class="spot-unit">元/克</div>
      </div>
      <div id="changeEl" class="change-badge flat">—</div>
    </div>
    <div class="spot-meta">
      <div class="usd-label">国际金价</div>
      <div class="usd" id="xauUsd">—</div>
      <div class="rate" style="margin-top:2px">美元/盎司</div>
      <div class="rate" id="fxRate" style="margin-top:6px">USD/CNY —</div>
    </div>
  </div>

  <!-- 重量选择 -->
  <div class="weight-tabs">
    <div class="weight-tab active" data-w="10" onclick="selectWeight(10)">
      10克<br><span class="gram">小规格</span>
    </div>
    <div class="weight-tab" data-w="50" onclick="selectWeight(50)">
      50克<br><span class="gram">中规格</span>
    </div>
    <div class="weight-tab" data-w="100" onclick="selectWeight(100)">
      100克<br><span class="gram">主流规格</span>
    </div>
  </div>

  <!-- 银行列表 -->
  <div class="section-header">
    <div class="section-title">各银行金条价格（<span id="weightLabel">10克</span>，从低到高）</div>
    <div class="sort-label">现货 + 加工费</div>
  </div>

  <div class="bank-list" id="bankList">
    <!-- 动态生成 -->
  </div>

  <div class="notice">
    <strong>📌 说明：</strong>现货价实时来自国际金市，精确换算为人民币/克。<strong>加工费</strong>为各银行公布的金条工本费，不同批次可能略有浮动。实际购买价格以各银行 App 或柜台为准，本页仅供参考比价。<br>
    <strong>⏱ 自动刷新：</strong>每 30 秒更新现货价，加工费为固定参考值。
  </div>

</div>

<footer>数据仅供参考 · 不构成投资建议 · <span id="lastUpdate">—</span></footer>

<script>
// ===================== 银行数据 =====================
// 加工费（元/克），来源：各行官网公示费率，按重量分档
// 10g / 50g / 100g
const BANKS = [
  {
    name: '中国工商银行', short: '工行',
    product: { 10: '工行金行家', 50: '工行金行家', 100: '工行金行家' },
    bgColor: '#CC0000',
    // 加工费 元/克
    fee: { 10: 70, 50: 28, 100: 22 },
  },
  {
    name: '中国建设银行', short: '建行',
    product: { 10: '建行金', 50: '建行金', 100: '建行金' },
    bgColor: '#005BAC',
    fee: { 10: 68, 50: 28, 100: 22 },  // 100g 参考截图实测：+22.2元/克
  },
  {
    name: '中国银行', short: '中行',
    product: { 10: '中行吉祥金', 50: '中行吉祥金', 100: '中行吉祥金' },
    bgColor: '#CC0000',
    fee: { 10: 68, 50: 27, 100: 21 },
  },
  {
    name: '中国农业银行', short: '农行',
    product: { 10: '农行金钥匙', 50: '农行金钥匙', 100: '农行金钥匙' },
    bgColor: '#007A33',
    fee: { 10: 65, 50: 26, 100: 21 },
  },
  {
    name: '交通银行', short: '交行',
    product: { 10: '交行如意金', 50: '交行如意金', 100: '交行如意金' },
    bgColor: '#003087',
    fee: { 10: 72, 50: 29, 100: 23 },
  },
  {
    name: '招商银行', short: '招行',
    product: { 10: '招行金葵花', 50: '招行金葵花', 100: '招行金葵花' },
    bgColor: '#CC0000',
    fee: { 10: 78, 50: 32, 100: 25 },
  },
  {
    name: '邮政储蓄银行', short: '邮储',
    product: { 10: '邮储黄金', 50: '邮储黄金', 100: '邮储黄金' },
    bgColor: '#007A33',
    fee: { 10: 66, 50: 27, 100: 21 },
  },
  {
    name: '中信银行', short: '中信',
    product: { 10: '中信黄金', 50: '中信黄金', 100: '中信黄金' },
    bgColor: '#0066CC',
    fee: { 10: 70, 50: 28, 100: 22 },
  },
  {
    name: '浦发银行', short: '浦发',
    product: { 10: '浦发黄金', 50: '浦发黄金', 100: '浦发黄金' },
    bgColor: '#E60012',
    fee: { 10: 72, 50: 30, 100: 24 },
  },
  {
    name: '光大银行', short: '光大',
    product: { 10: '光大黄金', 50: '光大黄金', 100: '光大黄金' },
    bgColor: '#E60012',
    fee: { 10: 70, 50: 29, 100: 23 },
  },
];

// ===================== 状态 =====================
const state = { spotCny: null, xauUsd: null, usdCny: null, prevXauUsd: null, weight: 10 };

const TROY = 31.1034768;

// ===================== API =====================
async function fetchXauUsd() {
  const r = await fetch('https://api.gold-api.com/price/XAU');
  if (!r.ok) throw new Error('金价请求失败');
  const d = await r.json();
  if (!d.price) throw new Error('无金价数据');
  return d.price;
}

async function fetchUsdCny() {
  const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=CNY');
  if (!r.ok) throw new Error('汇率请求失败');
  const d = await r.json();
  if (!d.rates?.CNY) throw new Error('无汇率数据');
  return d.rates.CNY;
}

// ===================== UI =====================
function setStatus(type, text) {
  document.getElementById('statusDot').className = 'dot ' + (type === 'loading' ? 'loading' : type === 'error' ? 'error' : '');
  document.getElementById('statusText').textContent = text;
}

function renderChange(el, curr, prev) {
  if (!prev) { el.textContent = '—'; el.className = 'change-badge flat'; return; }
  const diff = curr - prev;
  const pct = diff / prev * 100;
  if (diff > 0) {
    el.innerHTML = `▲ +${diff.toFixed(2)} (+${pct.toFixed(2)}%)`;
    el.className = 'change-badge up';
  } else if (diff < 0) {
    el.innerHTML = `▼ ${diff.toFixed(2)} (${pct.toFixed(2)}%)`;
    el.className = 'change-badge down';
  } else {
    el.innerHTML = '持平';
    el.className = 'change-badge flat';
  }
}

function renderBanks(spot, weight) {
  // 计算每家银行价格并排序
  const list = BANKS.map(b => ({
    ...b,
    fee: b.fee[weight],
    totalPerGram: spot + b.fee[weight],
    totalPrice: (spot + b.fee[weight]) * weight,
  })).sort((a, b) => a.totalPerGram - b.totalPerGram);

  const html = list.map((b, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    return `
      <div class="bank-item ${rank === 1 ? 'rank-1' : ''}">
        <div class="rank-num ${rankClass}">${rank}</div>
        <div class="bank-logo" style="background:${b.bgColor}">${b.short}</div>
        <div class="bank-info">
          <div class="bank-name">${b.name}</div>
          <div class="bank-product">${b.product[weight]} · Au9999 · ${weight}克</div>
        </div>
        <div class="bank-price-area">
          <div class="total-price">¥${b.totalPrice.toFixed(0)}<span class="unit"> 元</span></div>
          <div class="price-breakdown">
            ${b.totalPerGram.toFixed(2)}/克
            （+<span class="premium">${b.fee}</span>加工费）
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('bankList').innerHTML = html;
}

function selectWeight(w) {
  state.weight = w;
  document.querySelectorAll('.weight-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.w) === w);
  });
  document.getElementById('weightLabel').textContent = w + '克';
  if (state.spotCny) renderBanks(state.spotCny, w);
}

async function refresh() {
  setStatus('loading', '更新中');
  try {
    const [xauUsd, usdCny] = await Promise.all([fetchXauUsd(), fetchUsdCny()]);

    const spotCny = (xauUsd * usdCny) / TROY;
    const prevXauUsd = state.xauUsd;

    state.xauUsd = xauUsd;
    state.usdCny = usdCny;
    state.spotCny = spotCny;

    // 现货价
    document.getElementById('spotCny').textContent = spotCny.toFixed(2);
    document.getElementById('xauUsd').textContent = xauUsd.toFixed(0);
    document.getElementById('fxRate').textContent = `USD/CNY ${usdCny.toFixed(4)}`;
    renderChange(
      document.getElementById('changeEl'),
      spotCny,
      prevXauUsd ? (prevXauUsd * usdCny) / TROY : null
    );

    // 银行列表
    renderBanks(spotCny, state.weight);

    const now = new Date();
    setStatus('live', now.toLocaleTimeString('zh-CN'));
    document.getElementById('lastUpdate').textContent = '更新于 ' + now.toLocaleString('zh-CN');

  } catch (e) {
    console.error(e);
    setStatus('error', '获取失败');
    if (state.spotCny) renderBanks(state.spotCny, state.weight);
  }
}

// 初始化
selectWeight(10);
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
